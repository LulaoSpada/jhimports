<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JH IMPORTS</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #020617;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card-title {
      font-size: 16px;
      font-weight: bold;
    }

    .card-desc {
      font-size: 14px;
      opacity: 0.7;
      margin: 5px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #22c55e;
      color: black;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>JH IMPORTS</header>

<div class="container">
  <div class="grid">

    <!-- CARD INÍCIO -->
    <div class="card">
      <img src="//Gemini_Generated_Image_mlmx7umlmx7umlmx.png" alt="Produto">
      <div class="card-content">
        <div class="card-title">Chuteira Nike Tiempo 10 Academy Society Preta</div>
        <div class="card-desc">Para quem joga bem</div>
        <a class="btn" href="#">Ver mais</a>
      </div>
    </div>
    <!-- CARD FIM -->

    <!-- DUPLIQUE OS CARDS ABAIXO -->

    <div class="card">
      <img src="//Gemini_Generated_Image_dc43ftdc43ftdc43.png" alt="Produto">
      <div class="card-content">
        <div class="card-title">Chuteira Nike Campo Vapor 15 Elite</div>
        <div class="card-desc">Para quem busca perfomance</div>
        <a class="btn" href="#">Ver mais</a>
      </div>
    </div>

    <div class="card">
      <img src="//Gemini_Generated_Image_2tb74s2tb74s2tb7.png" alt="Produto">
      <div class="card-content">
        <div class="card-title">Chuteira Campo Masculina Nike Vapor 15 Club </div>
        <div class="card-desc">Pra quem é apaixonado por futebol</div>
        <a class="btn" href="#">Ver mais</a>
      </div>
    </div>

  </div>
</div>

</body>
</html>
